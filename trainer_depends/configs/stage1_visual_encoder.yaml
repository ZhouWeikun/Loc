hardware_setting:
#  batchsize_sat: 768 #batchsize_uav的整数倍
#  batchsize_uav: 64
  batchsize_sat: 1024 #batchsize_uav的整数倍
  batchsize_uav: 64
  sat_as_query: False #sat_as_query数量=batchsize_uav
  autocast: True
  gpu_ids: '0'
  num_worker: 8
  ance_enabled: False

learning_setting:
  num_epochs: 200

network_setting:
  backbone: dinov3
