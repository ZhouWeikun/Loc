exp_setting:
  exps_dir: .exps  # 相对于项目根目录
  exp_name: stage3_neural_proxy_nr32_nc24_r36_LossLogsumHD
  save_freq: 5
  tensorboard: True
  val: False
  val_freq: 1

  # load_stage1_ckpt: Stage 1训练好的checkpoint路径
  # 例如: .exps/stage1_visual_encoder/checkpoint_epoch99.pth
  load_stage1_ckpt: "/home/data/zwk/pyproj_neuloc_v0/train_img_encoder/exps/multiscene_12km2_cl_salad_ep100/epoch095.pth"

  # load_stage2_ckpt: Stage 2训练好的checkpoint路径
  # 例如: .exps/stage2_grid_hashfit/checkpoint_epoch99.pth
  load_stage2_ckpt: "/home/data/zwk/pyproj_neuloc_v0/trainers/exps/stage2_grid_hashfit_1/epoch1000.pth"

  # load2test: 测试时加载的checkpoint（字符串路径）
  load2test: "/home/data/zwk/pyproj_neuloc_v0/trainers/exps/stage3_neural_proxy_nr40_nc30_r36_LossLogSumHD_DE/epoch001.pth"
#  load2test: "/home/data/zwk/pyproj_neuloc_v0/trainers/exps/stage3_project_integrateRot_classify_r36_t0.05/epoch001.pth"

  # load2train: 继续训练时加载的checkpoint（字符串路径）
  load2train: ""

# ==================== 数据加载配置 ====================
data_setting:
  imgsize2net: 224
  satimgsize2crop: 244   #satimgsize2crop：res02m:zuchwil=540,zurich=614; res03m:zuchwil=400; res05m:zurich=224
  n_rand2sample_per_pos: 256 #16


# ==================== 场景配置 ====================
# 场景列表（支持任意数量）：
# - 当列表只有1个场景时，程序自动使用单场景模式
# - 当列表有多个场景时，程序自动使用多场景模式
# 采样策略（仅在多场景时生效）：
# - "round_robin": 循环轮流采样各场景
# - "random": 随机选择场景
# - "weighted": 根据场景权重加权采样
scenes_setting:
  sampling_strategy: "random"
  # 场景列表（变长）
  scenes:
    - name: "zurich"
      p_satinfo_json: /home/data/zwk/data_uavimgs_wingtra/Zurich/zurich_blocks12_proj2056_res03m.json
      p_uavinfo_json: /home/data/zwk/data_uavimgs_wingtra/Zurich/uavimgs_info/uavimgs_metainfo.json
      p_uav_geocsv: /home/data/zwk/data_uavimgs_wingtra/Zurich/uavimgs_info/uavimgs_geo_corrected_v1.csv
      weight: 1.0  # 采样权重（仅在sampling_strategy="weighted"时使用）
#    - name: "zuchwil"
#      p_satinfo_json: /home/data/zwk/data_uavimgs_wingtra/Zuchwil/zuchwil_blocks12_proj2056_res03m.json
#      p_uavinfo_json: /home/data/zwk/data_uavimgs_wingtra/Zuchwil/uavimgs_info/uavimgs_metainfo.json
#      p_uav_geocsv: /home/data/zwk/data_uavimgs_wingtra/Zuchwil/uavimgs_info/uavimgs_geo_corrected_v1.csv
#      weight: 1.0

hardware_setting:
  autocast: True
  batchsize_sat: 32
  batchsize_uav: 4
  batchsize_uav_test: 128
  gpu_ids: '0'
  num_worker: 8

learning_setting:
  num_epochs: 20

network_setting:
  backbone: dinov3
