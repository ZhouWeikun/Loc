hardware_setting:
  autocast: False
  batchsize_sat: 512 #24
  batchsize_uav: 64
  batchsize_uav_test: 128
  gpu_ids: '0'
  num_worker: 8
  satmaps_on_cpu: True

learning_setting:
  num_epochs: 1000

network_setting:
  #stage1
  backbone: dinov3
  #stage2
  p_grid_config_yaml: trainer_depends/configs/nerf_hash_visloc.yaml
