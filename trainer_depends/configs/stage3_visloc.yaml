hardware_setting:
  autocast: True
  batchsize_sat: 32
  batchsize_uav: 4
  batchsize_uav_test: 128
  gpu_ids: '0'
  num_worker: 8

learning_setting:
  num_epochs: 20
  loss_type: sms_wm

network_setting:
  #stage1
  backbone: dinov3
  #stage2
  p_grid_config_yaml: trainer_depends/configs/nerf_hash.yaml
  posenc_multires_rc: 8
  posenc_multires_rot: 6
  posenc_multires_scale: 4
  grid_mlp_hidden_dim: 1024
  grid_mlp_num_blocks: 2
