device: 'cuda'
pretrained: null
log_level: 20

blas:
  constructor: 'OctreeAS.make_dense'
  level: 3

grid:
  constructor: 'HashGrid.from_geometric'
  multiscale_type: 'cat'
  feature_std: 5.0e-04
  feature_bias: 0.0
  feature_dim: 1024
  num_lods: 4
  codebook_bitwidth: 19
  min_grid_res: 32
  max_grid_res: 256

nef:
  constructor: 'NeuralRadianceField'
  pos_embedder: 'none'
  view_embedder: 'positional'
  pos_multires: 10
  view_multires: 4
  position_input: False
  activation_type: 'relu'
  layer_type: 'linear'
  hidden_dim: 64
  num_layers: 1
  bias: True
  prune_density_decay: 0.95
  prune_min_density: 2.956033378250884

tracer:
  constructor: 'PackedRFTracer'
  bg_color: [0.0, 0.0, 0.0]
  num_steps: 2048
  raymarch_type: 'ray'
  step_size: 1.0

dataset:
  constructor: 'NeRFSyntheticDataset'
  dataset_path: '/home/data/zwk/dataset_Synthetic_NeRF/Lego'
  split: 'train'
  bg_color: [0.0, 0.0, 0.0]
  mip: 0
  dataset_num_workers: -1

dataset_transform:
  constructor: 'SampleRays'
  num_samples: 4096

trainer:
  exp_name: "nerf-hash"
  mode: 'train'
  max_epochs: 100
  save_every: 100
  save_as_new: False
  model_format: 'full'
  render_every: 100
  valid_every: 100
  enable_amp: True
  profile_nvtx: False
  grid_lr_weight: 500.0
  scheduler: True
  prune_every: 100
  random_lod: False
  rgb_lambda: 1.0
  rgb_loss_type: 'huber'
  rgb_loss_denom: 'rays'
  dataloader:
    batch_size: 1
    num_workers: 0
  optimizer:
    constructor: 'AdamW'
    lr: 0.001
    eps: 1.0e-16
    weight_decay: 1.0e-06

tracker:
  log_dir: '_results/logs/runs'
  enable_tensorboard: True
  enable_wandb: False
  tensorboard:
    log_dir: '_results/logs/runs'
    exp_name: null
    log_fname: null
  wandb:
    project: 'wisp-nerf'
    entity: null
    job_type: 'train'
  visualizer:
    render_res: [1024, 1024]
    render_batch: 10000
  vis_camera:
    camera_origin: [-3.0, 0.65, -3.0]
    camera_lookat: [0.0, 0.0, 0.0]
    camera_fov: 30
    camera_clamp: [0.0, 10.0]
    viz360_num_angles: 20
    viz360_radius: 3.0
    viz360_render_all_lods: False
