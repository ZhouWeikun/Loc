exp_setting:
  dir2save_log: /home/data/zwk/pyproj_neuloc_v0/gen_fm_exps/logs
  dir2save_ckpt: /home/data/zwk/pyproj_neuloc_v0/gen_fm_exps/ckpts
  exp_name: stage2_apr_mlp
  save_freq: 10
  tensorboard: True
  val: True
  val_freq: 1

  # Required for a meaningful APR baseline. Point this to the Stage-1 .pth checkpoint.
  load_stage1_ckpt: ""
  inherit_stage1_yaml: ""
  inherit_stage1_scope: "network,data"

  load2train: ""
  load2test: ""

scenes_setting:
  sampling_strategy: "weighted"
  dataset_name: wingtra
  selected_scene_name: zurich
  scene_registry:
    zurich:
      name: zurich
      dataset_name: wingtra
      p_satinfo_json: /home/data/zwk/data_uavimgs_wingtra/Zurich/zurich_blocks12_proj2056_res03m.json
      p_uavinfo_json: /home/data/zwk/data_uavimgs_wingtra/Zurich/uavimgs_info/uavimgs_metainfo.json
      p_uav_geocsv: /home/data/zwk/data_uavimgs_wingtra/Zurich/uavimgs_info/uavimgs_geo_corrected_v1.csv
      weight: 1.0
    zuchwil:
      name: zuchwil
      dataset_name: wingtra
      p_satinfo_json: /home/data/zwk/data_uavimgs_wingtra/Zuchwil/zuchwil_blocks12_proj2056_res03m.json
      p_uavinfo_json: /home/data/zwk/data_uavimgs_wingtra/Zuchwil/uavimgs_info/uavimgs_metainfo.json
      p_uav_geocsv: /home/data/zwk/data_uavimgs_wingtra/Zuchwil/uavimgs_info/uavimgs_geo_corrected_v1.csv
      weight: 1.0
    visloc_03:
      name: visloc_03
      dataset_name: visloc
      p_satinfo_json: /home/data/zwk/dataset_UAV-VisLoc/03/satellite03_epsg32650_res03m_multTifs.json
      p_uavinfo_json: /home/data/zwk/dataset_UAV-VisLoc/03/uavimgs_metainfo.json
      p_uav_geocsv: /home/data/zwk/dataset_UAV-VisLoc/03/uavimgs_geo_corrected.csv
      weight: 1.0
    visloc_04:
      name: visloc_04
      dataset_name: visloc
      p_satinfo_json: /home/data/zwk/dataset_UAV-VisLoc/04/satellite04_epsg32650_res03m_multTifs.json
      p_uavinfo_json: /home/data/zwk/dataset_UAV-VisLoc/04/uavimgs_metainfo.json
      p_uav_geocsv: /home/data/zwk/dataset_UAV-VisLoc/04/uavimgs_geo_corrected.csv
      weight: 1.0

hardware_setting:
  autocast: False
  batchsize_uav: 64
  batchsize_uav_test: 128
  gpu_ids: '0'
  num_worker: 0
  satmaps_on_cpu: True

learning_setting:
  num_epochs: 500
  apr_optimizer: adamw
  apr_lr: 0.001
  apr_weight_decay: 0.0001
  apr_loss_weight_nrc: 1.0
  apr_loss_weight_rot: 1.0
  apr_loss_weight_scale: 1.0
  apr_max_eval_batches:

network_setting:
  # APR default: image feature -> MLP -> [nr, nc, cos(rot), sin(rot), log_scale].
  # backbone / aggregator_type / adapter_config should normally be inherited from Stage 1.
  apr_target_mode: euc5d
  apr_mlp_hidden_dim: 512
  apr_mlp_num_layers: 4
  apr_mlp_norm: layer
  apr_mlp_dropout: 0.1
  apr_mlp_activation: relu
  apr_output_tanh: False
  apr_normalize_input_feat: True
  apr_eval_clamp: True
  apr_require_stage1_ckpt: True
