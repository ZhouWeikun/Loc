# ==================== 场景配置 ====================
# 场景列表（支持任意数量）：
# - 当列表只有1个场景时，程序自动使用单场景模式
# - 当列表有多个场景时，程序自动使用多场景模式
# 采样策略（仅在多场景时生效）：
# - "round_robin": 循环轮流采样各场景
# - "random": 随机选择场景
# - "weighted": 根据场景权重加权采样
scenes_setting:
  sampling_strategy: "weighted"
  dataset_name: visloc #visloc or neuloc/wingtra
  selected_scene_name: visloc_03
  scene_registry:
    visloc_03:
      name: visloc_03
      p_satinfo_json: /home/data/zwk/dataset_UAV-VisLoc/03/satellite03_epsg32650_res03m_multTifs.json
      p_uavinfo_json: /home/data/zwk/dataset_UAV-VisLoc/03/uavimgs_metainfo.json
      p_uav_geocsv: /home/data/zwk/dataset_UAV-VisLoc/03/uavimgs_geo_corrected.csv
    visloc_04:
      name: visloc_04
      p_satinfo_json: /home/data/zwk/dataset_UAV-VisLoc/04/satellite04_epsg32650_res03m_multTifs.json
      p_uavinfo_json: /home/data/zwk/dataset_UAV-VisLoc/04/uavimgs_metainfo.json
      p_uav_geocsv: /home/data/zwk/dataset_UAV-VisLoc/04/uavimgs_geo_corrected.csv


hardware_setting:
  autocast: False
  batchsize_sat: 512 #24
  batchsize_uav: 64
  batchsize_uav_test: 128
  gpu_ids: '0'
  num_worker: 8
  satmaps_on_cpu: True

learning_setting:
  num_epochs: 1000

network_setting:
  #stage2
  p_grid_config_yaml: trainer_depends/configs/nerf_hash_visloc.yaml
  posenc_multires_rc: 8
  posenc_multires_rot: 6
  posenc_multires_scale: 4
  grid_mlp_hidden_dim: 1024 #org=512
  grid_mlp_num_blocks: 2
  grid_mlp_use_coord_condition: true

