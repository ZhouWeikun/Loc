exp_setting:
  exps_dir: /home/data/zwk/pyproj_neuloc_v0/train_img_encoder/exps
  exp_name: debug_multiscene
  save_freq: 1
  tensorboard: True
  val: True
  val_freq: 1

  # load2test: 字典形式，可以分别指定不同网络部件的checkpoint
  # 支持的键: vis_encoder, vis_aggregator
  # 使用空字典 {} 或 null 表示不加载
  load2test:
    vis_encoder: ""  # 留空表示不加载
    vis_aggregator: "/home/data/zwk/pyproj_neuloc_v0/train_img_encoder/exps/multiscene_12km2_cl_salad_ep100/epoch095.pth"  # 示例: /path/to/aggregator.pth

  # load2train: 字典形式，用于继续训练时加载checkpoint
  # 额外支持键: optimizer (优化器状态), epoch (epoch数)
  load2train:
    vis_encoder: ""
    vis_aggregator: ""
    optimizer: ""  # 优化器状态
    # epoch 会自动从checkpoint中读取

# ==================== 数据加载配置 ====================
data_setting:
  imgsize2net: 224
  satimgsize2crop: 244   #satimgsize2crop：res02m:zuchwil=540,zurich=614; res03m:zuchwil=400; res05m:zurich=224
  n_rand2sample_per_pos: 256 #16

# ==================== 场景配置 ====================
# 场景列表（支持任意数量）：
# - 当列表只有1个场景时，程序自动使用单场景模式
# - 当列表有多个场景时，程序自动使用多场景模式
# 采样策略（仅在多场景时生效）：
# - "round_robin": 循环轮流采样各场景
# - "random": 随机选择场景
# - "weighted": 根据场景权重加权采样
scenes_setting:
  sampling_strategy: "random"
  # 场景列表（变长）
  scenes:
    - name: "zurich"
      p_satinfo_json: /home/data/zwk/data_uavimgs_wingtra/Zurich/zurich_blocks12_proj2056_res03m.json
      p_uavinfo_json: /home/data/zwk/data_uavimgs_wingtra/Zurich/uavimgs_info/uavimgs_metainfo.json
      p_uav_geocsv: /home/data/zwk/data_uavimgs_wingtra/Zurich/uavimgs_info/uavimgs_geo_corrected_v1.csv
      weight: 1.0  # 采样权重（仅在sampling_strategy="weighted"时使用）
    - name: "zuchwil"
      p_satinfo_json: /home/data/zwk/data_uavimgs_wingtra/Zuchwil/zuchwil_blocks12_proj2056_res03m.json
      p_uavinfo_json: /home/data/zwk/data_uavimgs_wingtra/Zuchwil/uavimgs_info/uavimgs_metainfo.json
      p_uav_geocsv: /home/data/zwk/data_uavimgs_wingtra/Zuchwil/uavimgs_info/uavimgs_geo_corrected_v1.csv
      weight: 1.0
    # 添加更多场景（如果需要），只需继续添加列表项即可

hardware_setting:
  autocast: False
  batchsize_sat: 256 #24
  batchsize_uav: 256
  gpu_ids: '0'
  num_worker: 8

learning_setting:
  num_epochs: 100

network_setting:
  backbone: dinov3
