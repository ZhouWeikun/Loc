#      p_satinfo_json: /home/data/zwk/dataset_UAV-VisLoc/03/satellite03_epsg32650_res03m_multi_tifs.json
#      p_uavinfo_json: /home/data/zwk/dataset_UAV-VisLoc/03/uavimgs_metainfo.json
#      p_uav_geocsv:  /home/data/zwk/dataset_UAV-VisLoc/03/uavimgs_geo_corrected.csv
#    - name: "visloc_04"
#      p_satinfo_json: /home/data/zwk/dataset_UAV-VisLoc/04/satellite04_epsg32650_res03m_multi_tifs.json
#      p_uavinfo_json: /home/data/zwk/dataset_UAV-VisLoc/04/uavimgs_metainfo.json
#      p_uav_geocsv: /home/data/zwk/dataset_UAV-VisLoc/04/uavimgs_geo_corrected.csv

hardware_setting:
#  batchsize_sat: 768 #batchsize_uav的整数倍
#  batchsize_uav: 64
  batchsize_sat: 1024 #batchsize_uav的整数倍
  batchsize_uav: 64
  sat_as_query: False #sat_as_query数量=batchsize_uav
  ance_enabled: False
  autocast: True
  gpu_ids: '0'
  num_worker: 8

learning_setting:
  loss_type: tripleLoss_singleEdge_hardest_fm_mask
  num_epochs: 150
  #when evaluating
  val_overlap: 0.5
  val_ref_wo_rot_var: True
  val_ref_wo_scale_var: True
  val_query_rot2uniform: True
  val_query_scale2uniform: False


network_setting:
  aggregator_type: salad
  aggregator_config:
    output_dim: 1024
    cluster_dim: 64
    hidden_layer_dim: 512
    use_residual: true
    with_dustbin: true
  backbone: dinov3
  freeze_backbone: true
  backbone_config: {}
